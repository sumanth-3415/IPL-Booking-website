<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("https://www.shutterstock.com/image-photo/cricket-stadium-closeup-600nw-2591934731.jpg") no-repeat center/cover;
    color: white;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(0,0,0,0.6);
}

.logo {
    font-size: 22px;
    color: orange;
    font-weight: bold;
}

.logout {
    padding: 10px 20px;
    background: orange;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.logout:hover {
    background: darkorange;
}

/* Content */
.content {
    text-align: center;
    margin-top: 150px;
}

h1 {
    font-size: 50px;
}

.user {
    margin-top: 10px;
    font-size: 18px;
    color: #ccc;
}

.main-btn {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 18px;
    background: linear-gradient(45deg, orange, darkorange);
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

.main-btn:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="overlay">

<!-- Navbar -->
<div class="navbar">
    <div class="logo">IPL Booking 🏏</div>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- Content -->
<div class="content">
    <h1>Welcome to IPL Booking</h1>
    <div class="user" id="userText">Loading...</div>

    <button class="main-btn" onclick="goToMatches()">🎟️ View Matches</button>
</div>

</div>

<script>
// Run after page loads
window.onload = function() {

    const user = localStorage.getItem("user");

    if (!user) {
        alert("Please login first!");
        window.location.href = "login.html";
    } else {
        document.getElementById("userText").innerText = "Logged in as: " + user;
    }
};

// Go to matches page
function goToMatches() {
    window.location.href = "dashboard.html";
}

// Logout
function logout() {
    // ❌ remove only one key (old way)
    // localStorage.removeItem("user");

    // ✅ clear everything
    localStorage.clear();

    alert("Logged out successfully");

    // ✅ redirect to main home page
    window.location.href = "index.html";
}


</script>

</body>
</html>
