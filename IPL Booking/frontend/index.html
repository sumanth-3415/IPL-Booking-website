<!DOCTYPE html>
<html>
<head>

    <style>

        }

        .navbar h2 {

            margin: 0;

            font-size: 55px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 20px;

        .btn {
            padding: 12px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;

<!-- Hero -->
<div class="hero">

    <p>Book Ticket for your favourite match and enjoy live cricket in the stadium</p>

    <a href="login.html">
