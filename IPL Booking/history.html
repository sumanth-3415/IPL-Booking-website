/* Overlay */
.overlay {
    background: rgba(0,0,0,0.8);
    min-height: 100vh;
}

/* Navbar */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(0,0,0,0.6);
}

.topbar h2 {
    color: orange;
}

.logout-btn {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    background: crimson;
    color: white;
    cursor: pointer;
}

/* Title */
h1 {
    text-align: center;
    margin: 20px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
}

/* Cards */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 12px;
    text-align: left;
    transition: 0.3s;
    border: 2px solid rgba(255,215,0,0.3);
}

.card:hover {
    transform: scale(1.05);
    border-color: #ffd700;
}

.card h3 {
    margin: 0 0 15px 0;
    color: #ffd700;
    font-size: 1.3em;
}

.card-row {
    margin: 10px 0;
    padding: 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    border-left: 3px solid #ff99ff;
}

.card-row strong {
    color: #d936ff;
}

.card-row span {
    color: white;
}

.empty-message {
    text-align: center;
    padding: 40px;
    color: #ddd;
    font-size: 1.2em;
}

.home-btn {
    background: linear-gradient(45deg, #ff9800, #ffb74d) !important;
    box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
}

.home-btn:hover {
    box-shadow: 0 8px 25px rgba(255, 152, 0, 0.4);
}
</style>
</head>

<body>

<div class="overlay">

<script>
const currentUser = localStorage.getItem("user");
if (!currentUser) {
    window.location.href = "index.html";
}
</script>

<!-- Navbar -->
<div class="topbar">
    <h2>IPL Booking 🏏</h2>
    <div style="display: flex; gap: 10px;">
        <button class="logout-btn" style="background: linear-gradient(45deg, #4caf50, #66bb6a);" onclick="goHome()">🏠 Home</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<h1>📋 Your Booking History</h1>

<div class="container" id="history"></div>

<script>

function goHome() {
    window.location.href = "dashboard.html";
}

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

const email = localStorage.getItem("user");
const historyDiv = document.getElementById("history");

if (!email) {
    historyDiv.innerHTML = '<div class="empty-message">Please log in to view your booking history</div>';
} else {
    fetch(`http://localhost:5000/api/bookings/${email}`)
        .then(res => res.json())
        .then(data => {
            if (!data || data.length === 0) {
                historyDiv.innerHTML = '<div class="empty-message">No bookings found. Start booking your IPL tickets!</div>';
            } else {
                data.forEach(booking => {
                    const card = document.createElement("div");
                    card.className = "card";
                    
                    const date = new Date(booking.createdAt).toLocaleString();
                    const seatsDisplay = Array.isArray(booking.seats) ? booking.seats.join(", ") : booking.seats;
                    
                    card.innerHTML = `
                        <h3>⚡ ${booking.match || 'Match'}</h3>
                        <div class="card-row">
                            <strong>📍 Stadium:</strong> <span>${booking.stadium || 'N/A'}</span>
                        </div>
                        <div class="card-row">
                            <strong>📅 Date:</strong> <span>${booking.matchDate || 'N/A'}</span>
                        </div>
                        <div class="card-row">
                            <strong>🪑 Seats:</strong> <span>${seatsDisplay}</span>
                        </div>
                        <div class="card-row">
                            <strong>💳 Payment Method:</strong> <span>${booking.paymentMethod || 'N/A'}</span>
                        </div>
                        <div class="card-row">
                            <strong>📝 Booked On:</strong> <span>${date}</span>
                        </div>
                    `;
                    
                    historyDiv.appendChild(card);
                });
            }
        })
        .catch(err => {
            console.error("Error fetching bookings:", err);
            historyDiv.innerHTML = '<div class="empty-message">Unable to load booking history. Please try again later.</div>';
        });
}

</script>

</div>

</body>
</html>
