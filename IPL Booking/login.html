<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSD1pmMdlwSHdbIyxohHtFH5DrdEH3igC_jdg&s") no-repeat center/cover;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.8);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

/* Password toggle */
.password-box {
    position: relative;
}

.password-box span {
    position: absolute;
    right: 20px;
    top: 12px;
    cursor: pointer;
    color: black;
}

button {
    width: 100%;
    padding: 10px;
    background: orange;
    border: none;
    color: white;
    border-radius: 5px;
}

/* Loader */
.loader {
    display: none;
    margin-top: 10px;
}

/* Success popup */
.success-box {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.success-card {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

.tick {
    font-size: 40px;
    color: green;
}
</style>
</head>

<body>

<div class="overlay">

<div class="card">
    <h2>Login 🏏</h2>

    <input id="email" placeholder="Email">

    <div class="password-box">
        <input id="password" type="password" placeholder="Password">
        <span onclick="togglePassword()">👁</span>
    </div>

    <button onclick="login()">Login</button>

    <div class="loader" id="loader">⏳ Loading...</div>
</div>

</div>

<!-- Success -->
<div id="successBox" class="success-box">
    <div class="success-card">
        <h2>LOGIN SUCCESSFUL</h2>
        <div class="tick">✔</div>
    </div>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

async function login() {
    document.getElementById("loader").style.display = "block";

    const res = await fetch("http://localhost:5000/api/users/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    const msg = await res.text();

    document.getElementById("loader").style.display = "none";

    if (msg === "Login Success") {
        localStorage.setItem("user", email.value);
        document.getElementById("successBox").style.display = "flex";

        setTimeout(() => {
            window.location.href = "home.html";
        }, 2000);
    } else {
        alert("Invalid Credentials");
    }
}
</script>

</body>
</html>
